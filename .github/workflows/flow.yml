name: 同步Gitee subtree上游模块
on:
  schedule:
    - cron: '0 3 * * *' # UTC03:00 = 北京时间11:00 每日增量执行
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 同步模式 increment增量 / force强制全覆盖
        default: increment
        required: true
        type: choice
        options:
          - increment
          - force

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_MODE: ${{ github.event.inputs.sync_mode }}
      PREFIX_DIR: dd
      GITEE_BRANCH: main
    steps:
      - name: 检出完整main分支代码
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0 # subtree依赖完整git历史

      - name: 配置Git提交机器人身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 预处理远程源与冲突清理
        run: |
          GITEE_URL="https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/lr-avionics/test.git"
          # 重建远程，避免重复添加报错
          git remote remove gitee-upstream 2>/dev/null || true
          git remote add gitee-upstream "$GITEE_URL"
          git fetch gitee-upstream --tags
          # 中止残留合并，清空工作区冲突
          git merge --abort 2>/dev/null || true
          git reset --hard HEAD
          git clean -fd

      - name: 执行subtree同步（区分增量/强制）
        id: sync_step
        run: |
          GITEE_URL="https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/lr-avionics/test.git"
          if [[ "$SYNC_MODE" == "force" ]]; then
            echo "===== 强制同步模式：完全对齐Gitee上游 ====="
            # 强制：重新拉取并覆盖prefix目录，丢弃本地所有改动
            git subtree pull --prefix=${PREFIX_DIR} "$GITEE_URL" ${GITEE_BRANCH} --squash -m "[FORCE] sync: 强制对齐Gitee模块最新代码"
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "===== 增量同步模式 ====="
            if git subtree pull --prefix=${PREFIX_DIR} "$GITEE_URL" ${GITEE_BRANCH} --squash -m "sync: 同步Gitee模块最新代码"; then
              echo "has_update=true" >> $GITHUB_OUTPUT
            else
              echo "Gitee无新更新，跳过推送"
              echo "has_update=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 推送代码到GitHub main分支
        if: steps.sync_step.outputs.has_update == 'true'
        run: |
          if [[ "$SYNC_MODE" == "force" ]]; then
            # 强制模式使用--force覆盖远端分叉
            git push --force origin main
          else
            # 增量模式正常fast-forward推送
            git push origin main
